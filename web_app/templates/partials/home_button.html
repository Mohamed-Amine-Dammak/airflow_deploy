{% if request.endpoint != 'index' %}
<a class="home-shortcut" href="{{ url_for('index') }}" aria-label="Go to home page" title="Home">
  <svg class="home-shortcut__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
    <path d="M12 4.4 4.5 10.7v8.1a1 1 0 0 0 1 1H10v-5.1a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5.1h4.5a1 1 0 0 0 1-1v-8.1L12 4.4z"></path>
  </svg>
</a>
<style>
  .home-shortcut {
    position: fixed;
    top: 12px;
    right: 16px;
    z-index: 9999;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    min-height: 38px;
    padding: 0;
    border-radius: 999px;
    border: 1px solid var(--border, rgba(255, 255, 255, 0.2));
    background: var(--bg-surface, rgba(14, 20, 34, 0.9));
    color: var(--text-primary, #e7edf7);
    text-decoration: none;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    animation: home-shortcut-enter 0.45s var(--ease-out, ease-out) both, home-shortcut-float 3.2s ease-in-out 0.45s infinite, home-shortcut-glow 2.6s ease-in-out 0.45s infinite;
  }

  .home-shortcut__icon {
    width: 16px;
    height: 16px;
    fill: currentColor;
    animation: home-shortcut-icon-pulse 2.4s ease-in-out infinite;
  }

  .home-shortcut--in-topbar {
    position: static;
    top: auto;
    right: auto;
    z-index: auto;
    margin-right: 8px;
    width: 30px;
    height: 30px;
    min-height: 30px;
    box-shadow: none;
    background: transparent;
    animation: home-shortcut-enter 0.35s var(--ease-out, ease-out) both;
  }

  .home-shortcut:hover {
    transform: translateY(-1px);
    border-color: var(--accent, #14d7be);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
  }

  .home-shortcut:focus-visible {
    outline: none;
    border-color: var(--accent, #14d7be);
    box-shadow: 0 0 0 3px var(--accent-glow, rgba(20, 215, 190, 0.25));
  }

  .home-shortcut--in-topbar .home-shortcut__icon {
    animation-duration: 2s;
  }

  @keyframes home-shortcut-enter {
    from { opacity: 0; transform: translateY(-6px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes home-shortcut-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }

  @keyframes home-shortcut-glow {
    0%, 100% { box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25); }
    50% { box-shadow: 0 8px 22px rgba(0, 0, 0, 0.3), 0 0 0 2px var(--accent-glow, rgba(20, 215, 190, 0.2)); }
  }

  @keyframes home-shortcut-icon-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  @media (prefers-reduced-motion: reduce) {
    .home-shortcut,
    .home-shortcut__icon {
      animation: none !important;
    }
  }
</style>
<script>
  (function() {
    var btn = document.querySelector('.home-shortcut');
    if (!btn) return;

    function applyFallbackFixedPosition() {
      var maxBottom = 0;
      var nodes = document.querySelectorAll('body *');
      for (var i = 0; i < nodes.length; i += 1) {
        var el = nodes[i];
        if (el === btn) continue;
        var style = window.getComputedStyle(el);
        if (style.position !== 'fixed') continue;
        if (style.display === 'none' || style.visibility === 'hidden') continue;
        var rect = el.getBoundingClientRect();
        if (rect.width < window.innerWidth * 0.45) continue;
        if (rect.top > 4) continue;
        if (rect.bottom > maxBottom) maxBottom = rect.bottom;
      }

      if (maxBottom > 0) {
        btn.style.top = Math.ceil(maxBottom + 8) + 'px';
      }
    }

    function placeInBuilderTopbar() {
      var topbarMain = document.querySelector('.topbar .topbar-main');
      if (!topbarMain) return false;
      topbarMain.insertBefore(btn, topbarMain.firstChild);
      btn.classList.add('home-shortcut--in-topbar');
      return true;
    }

    if (document.getElementById('app-root')) {
      if (placeInBuilderTopbar()) return;
      var retries = 0;
      var timer = setInterval(function() {
        retries += 1;
        if (placeInBuilderTopbar() || retries > 40) {
          clearInterval(timer);
          if (!btn.classList.contains('home-shortcut--in-topbar')) {
            applyFallbackFixedPosition();
          }
        }
      }, 250);
      return;
    }

    applyFallbackFixedPosition();
  })();
</script>
{% endif %}
