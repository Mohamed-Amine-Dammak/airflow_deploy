name: DAG CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - "airflow/dags/**"

  push:
    branches:
      - main
    paths:
      - "airflow/dags/**"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      changed_dags: ${{ steps.changed.outputs.changed_dags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff black pytest

      - name: Install Gitleaks
        run: |
          set -e
          GITLEAKS_VERSION=8.30.1
          curl -fL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          chmod +x gitleaks

      - name: Detect changed DAG files
        id: changed
        shell: bash
        run: |
          CHANGED=$(git diff --name-only HEAD^ HEAD | grep '^dags/.*\.py$' || true)
          echo "Changed DAG files:"
          echo "$CHANGED"
          CHANGED_JSON=$(printf '%s\n' "$CHANGED" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "changed_dags=$CHANGED_JSON" >> "$GITHUB_OUTPUT"

      - name: Fail if no DAG files changed
        shell: bash
        run: |
          if [ "${{ steps.changed.outputs.changed_dags }}" = "[]" ]; then
            echo "No changed DAG python files found."
            exit 1
          fi

      - name: Syntax check changed DAGs
        shell: bash
        run: |
          for file in $(echo '${{ steps.changed.outputs.changed_dags }}' | jq -r '.[]'); do
            echo "Checking syntax: $file"
            python -m py_compile "$file"
          done

      - name: Lint changed DAGs
        shell: bash
        run: |
          for file in $(echo '${{ steps.changed.outputs.changed_dags }}' | jq -r '.[]'); do
            echo "Linting: $file"
            ruff check "$file" || true
          done

      - name: Format check changed DAGs
        shell: bash
        run: |
          for file in $(echo '${{ steps.changed.outputs.changed_dags }}' | jq -r '.[]'); do
            echo "Format check: $file"
            black --check "$file" || true
          done

      - name: Secret scan changed DAGs
        shell: bash
        run: |
          for file in $(echo '${{ steps.changed.outputs.changed_dags }}' | jq -r '.[]'); do
            echo "Secret scan: $file"
            ./gitleaks detect --source "$file" --no-git --verbose --redact
          done

  airflow-validate:
    runs-on: [self-hosted, Windows, X64]
    needs: ci
    if: needs.ci.outputs.changed_dags != '[]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate changed DAGs only in Airflow container
        shell: powershell
        run: |
          $changed = '${{ needs.ci.outputs.changed_dags }}' | ConvertFrom-Json
          foreach ($file in $changed) {
            $containerPath = "/opt/airflow/" + ($file -replace '\\','/')
            Write-Host "Validating DAG file in container: $containerPath"

            docker exec airflowgitfresh-airflow-scheduler-1 python -c "from airflow.models.dagbag import DagBag; import sys; dag_bag = DagBag(dag_folder='$containerPath', include_examples=False); import_errors = dag_bag.import_errors; print(f'Loaded DAGs successfully: {len(dag_bag.dags)}'); [print(f'\n- {file}\n{err}') for file, err in import_errors.items()]; sys.exit(1 if import_errors else 0)"
          }

  cd:
    runs-on: ubuntu-latest
    needs: airflow-validate
    if: success()

    steps:
      - name: Fake deploy
        run: echo "CD step reached"
