name: Promote DAG to Prod

on:
  workflow_dispatch:
    inputs:
      pipeline_id:
        description: "Base pipeline ID"
        required: true
      version_id:
        description: "Version ID to promote to prod"
        required: true

permissions:
  contents: write

concurrency:
  group: promote-prod-${{ github.event.inputs.pipeline_id }}
  cancel-in-progress: false

jobs:
  promote-to-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout eval source
        uses: actions/checkout@v4
        with:
          ref: eval
          path: eval-src
          fetch-depth: 0

      - name: Checkout prod worktree
        uses: actions/checkout@v4
        with:
          ref: prod
          path: prod-worktree
          fetch-depth: 0
        continue-on-error: true

      - name: Ensure prod worktree exists
        run: |
          if [ ! -d "prod-worktree/.git" ]; then
            mkdir -p prod-worktree
            cp -r eval-src/.git prod-worktree/.git
            cd prod-worktree
            git checkout --orphan prod
            git rm -rf . || true
            echo "# Production Branch" > README.md
            git add README.md
            git -c user.email="airflow-bot@example.com" -c user.name="Airflow Bot" commit -m "Initialize prod branch"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Configure Git
        run: |
          cd prod-worktree
          git config user.email "airflow-bot@example.com"
          git config user.name "Airflow Bot"

      - name: Check promotion eligibility from eval source
        id: eligibility
        continue-on-error: true
        run: |
          python eval-src/scripts/promotion/check_promotion_eligibility.py \
            --root eval-src \
            --pipeline-id "${{ github.event.inputs.pipeline_id }}" \
            --version-id "${{ github.event.inputs.version_id }}"

      - name: Copy DAG from eval source to prod worktree
        if: steps.eligibility.outcome == 'success'
        run: |
          cd prod-worktree
          git fetch origin eval
          cd ..
          python eval-src/scripts/promotion/copy_dag_to_prod.py \
            --root prod-worktree \
            --pipeline-id "${{ github.event.inputs.pipeline_id }}" \
            --version-id "${{ github.event.inputs.version_id }}" \
            --eval-branch eval \
            --prod-branch prod

      - name: Update metadata for promoted DAG
        if: steps.eligibility.outcome == 'success'
        run: |
          python eval-src/scripts/metadata/update_pipeline_metadata.py promote \
            --root prod-worktree \
            --pipeline-id "${{ github.event.inputs.pipeline_id }}" \
            --version-id "${{ github.event.inputs.version_id }}" \
            --promotion-status champion

      - name: Validate metadata after promote update
        if: steps.eligibility.outcome == 'success'
        run: |
          python eval-src/scripts/metadata/validate_metadata.py --root prod-worktree

      - name: Guard legacy store is unchanged
        if: steps.eligibility.outcome == 'success'
        shell: bash
        run: |
          cd prod-worktree
          if git diff --name-only | grep -x "airflow/web_app_data/pipeline_versions_store.json" >/dev/null; then
            echo "ERROR: legacy store must not be modified: airflow/web_app_data/pipeline_versions_store.json"
            exit 1
          fi

      - name: Commit prod metadata updates
        if: steps.eligibility.outcome == 'success'
        run: |
          cd prod-worktree
          if git diff --quiet -- .; then
            echo "No metadata changes to commit"
          else
            git add dags/ airflow/web_app_data/metadata/
            git commit -m "Promote ${{ github.event.inputs.pipeline_id }}/${{ github.event.inputs.version_id }} metadata to champion"
          fi

      - name: Push prod branch
        if: steps.eligibility.outcome == 'success'
        run: |
          cd prod-worktree
          git push origin prod

      - name: Write eligibility decision artifact
        if: steps.eligibility.outcome != 'success'
        run: |
          mkdir -p evaluation-results
          cat > evaluation-results/promotion-eligibility.json << 'EOF'
          {
            "pipeline_id": "${{ github.event.inputs.pipeline_id }}",
            "version_id": "${{ github.event.inputs.version_id }}",
            "eligible": false,
            "reason": "blocked_by_score_policy"
          }
          EOF

      - name: Upload eligibility artifact
        if: steps.eligibility.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: promotion-eligibility-${{ github.event.inputs.pipeline_id }}-${{ github.event.inputs.version_id }}
          path: evaluation-results/promotion-eligibility.json
