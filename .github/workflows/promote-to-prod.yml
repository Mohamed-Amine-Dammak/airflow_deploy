name: Promote DAG to Prod

on:
  push:
    branches:
      - eval
    paths:
      - "airflow/web_app_data/metadata/**/*.json"
      - "dags/**/*.py"
  workflow_dispatch:
    inputs:
      metadata_file:
        description: "Optional metadata file for recovery/debug"
        required: false
      rollback_retention_enabled:
        description: "Keep old DAGs for rollback (true/false)"
        required: false
        default: "false"
  workflow_run:
    workflows: ["Evaluate DAG"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: promote-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote-to-prod:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout eval source
        uses: actions/checkout@v4
        with:
          ref: eval
          path: eval-src
          fetch-depth: 0

      - name: Checkout prod worktree
        uses: actions/checkout@v4
        with:
          ref: prod
          path: prod-worktree
          fetch-depth: 0
        continue-on-error: true

      - name: Ensure prod worktree exists
        shell: bash
        run: |
          if [ ! -d "prod-worktree/.git" ]; then
            mkdir -p prod-worktree
            cp -r eval-src/.git prod-worktree/.git
            cd prod-worktree
            git checkout --orphan prod
            git rm -rf . || true
            echo "# Production Branch" > README.md
            git add README.md
            git -c user.email="airflow-bot@example.com" -c user.name="Airflow Bot" commit -m "Initialize prod branch"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        shell: bash
        run: |
          cd prod-worktree
          git config user.email "airflow-bot@example.com"
          git config user.name "Airflow Bot"

      - name: Detect changed metadata files in eval
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/prod_metadata.txt
          : > /tmp/prod_promotable.txt
          event_name="${{ github.event_name }}"
          if [ "$event_name" = "workflow_dispatch" ]; then
            manual_file="${{ github.event.inputs.metadata_file || '' }}"
            if [ -n "$manual_file" ]; then
              echo "$manual_file" > /tmp/prod_metadata.txt
            else
              cd eval-src
              find airflow/web_app_data/metadata -type f -name "*.json" | sed 's#^\./##' > /tmp/prod_metadata.txt || true
              cd ..
            fi
          elif [ "$event_name" = "push" ]; then
            before_sha="${{ github.event.before }}"
            after_sha="${{ github.sha }}"
            cd eval-src
            if [ -n "$before_sha" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ]; then
              git diff --name-only "$before_sha" "$after_sha" | grep '^airflow/web_app_data/metadata/.*/.*\.json$' > /tmp/prod_metadata.txt || true
            else
              git show --name-only --pretty="" "$after_sha" | grep '^airflow/web_app_data/metadata/.*/.*\.json$' > /tmp/prod_metadata.txt || true
            fi
            cd ..
          elif [ "$event_name" = "workflow_run" ]; then
            run_sha="${{ github.event.workflow_run.head_sha }}"
            cd eval-src
            if [ -n "$run_sha" ]; then
              git show --name-only --pretty="" "$run_sha" | grep '^airflow/web_app_data/metadata/.*/.*\.json$' > /tmp/prod_metadata.txt || true
            fi
            cd ..
          else
            cd eval-src
            git show --name-only --pretty="" HEAD | grep '^airflow/web_app_data/metadata/.*/.*\.json$' > /tmp/prod_metadata.txt || true
            cd ..
          fi
          awk 'NF && !seen[$0]++' /tmp/prod_metadata.txt > /tmp/prod_metadata.dedup.txt || true
          mv /tmp/prod_metadata.dedup.txt /tmp/prod_metadata.txt
          echo "Detected metadata files:"
          if [ -s /tmp/prod_metadata.txt ]; then sed 's/^/- /' /tmp/prod_metadata.txt; else echo "- <none>"; fi
          changed_count=0
          promotable_count=0
          if [ -s /tmp/prod_metadata.txt ]; then
            while IFS= read -r meta_file; do
              [ -z "$meta_file" ] && continue
              if [ ! -f "eval-src/$meta_file" ]; then
                echo "metadata_file=$meta_file"
                echo "selected=false reason=missing_on_eval_checkout"
                continue
              fi
              changed_count=$((changed_count + 1))
              pipeline_id=$(python -c "import json,sys;d=json.load(open(sys.argv[1],encoding='utf-8'));print((d.get('pipeline_id') or '').strip())" "eval-src/$meta_file")
              version_id=$(python -c "import json,sys;d=json.load(open(sys.argv[1],encoding='utf-8'));print((d.get('version_id') or '').strip())" "eval-src/$meta_file")
              dag_file=$(python -c "import json,sys;d=json.load(open(sys.argv[1],encoding='utf-8'));print((d.get('git_dag_file') or '').strip())" "eval-src/$meta_file")
              publish_status=$(python -c "import json,sys;d=json.load(open(sys.argv[1],encoding='utf-8'));print(str(d.get('publish_status') or '').strip().lower())" "eval-src/$meta_file")
              promotion_status=$(python -c "import json,sys;d=json.load(open(sys.argv[1],encoding='utf-8'));print(str(d.get('promotion_status') or '').strip().lower())" "eval-src/$meta_file")
              echo "metadata_file=$meta_file"
              echo "pipeline_id=$pipeline_id"
              echo "version_id=$version_id"
              echo "git_dag_file=$dag_file"
              echo "publish_status=$publish_status"
              echo "promotion_status=$promotion_status"
              if [ "$promotion_status" = "challenger" ]; then
                echo "$meta_file" >> /tmp/prod_promotable.txt
                promotable_count=$((promotable_count + 1))
                echo "selected=true reason=promotion_status_challenger"
              else
                echo "selected=false reason=promotion_status_${promotion_status:-empty}"
              fi
            done < /tmp/prod_metadata.txt
          fi
          echo "PROD_CHANGED_COUNT=$changed_count" >> "$GITHUB_ENV"
          echo "PROD_PROMOTABLE_COUNT=$promotable_count" >> "$GITHUB_ENV"
          echo "processed_count=$promotable_count"
          if [ "$changed_count" -gt 0 ] && [ "$promotable_count" -eq 0 ]; then
            echo "No challenger metadata ready for prod promotion."
          fi

      - name: Promote changed challengers
        shell: bash
        run: |
          set -euo pipefail
          rollback_retention="${{ github.event.inputs.rollback_retention_enabled || 'false' }}"
          CMD=(python eval-src/scripts/promotion/promote_changed_challengers.py
            --eval-root eval-src
            --prod-root prod-worktree
            --decision-file evaluation-results/promotion-decisions.json
            --rollback-retention-enabled "$rollback_retention")
          if [ -s /tmp/prod_promotable.txt ]; then
            while IFS= read -r meta_file; do
              [ -z "$meta_file" ] && continue
              CMD+=(--metadata-file "$meta_file")
            done < /tmp/prod_promotable.txt
          fi
          "${CMD[@]}"

      - name: Inspect promotion decisions and compute expected promotions
        shell: bash
        run: |
          set -euo pipefail
          decision_file="eval-src/evaluation-results/promotion-decisions.json"
          if [ ! -f "$decision_file" ]; then
            echo "Missing decision file: $decision_file"
            exit 1
          fi
          python - << 'PY'
          import json
          from pathlib import Path

          path = Path("eval-src/evaluation-results/promotion-decisions.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          decisions = payload.get("decisions", [])
          expected = []
          failed = []
          for d in decisions:
            rel = str(d.get("metadata_file") or "").strip()
            eligible = bool(d.get("eligible"))
            promoted = bool(d.get("promoted"))
            reason = str(d.get("reason") or "").strip()
            details = str(d.get("details") or "").strip()
            print(f"decision metadata_file={rel} eligible={eligible} promoted={promoted} reason={reason}")
            if details:
              print(f"decision_details metadata_file={rel} details={details}")
            if rel and promoted:
              expected.append(rel)
            if rel and eligible and not promoted:
              failed.append((rel, reason or "unknown_reason", details))

          out = Path("/tmp/prod_expected_promotions.txt")
          out.write_text("\n".join(expected) + ("\n" if expected else ""), encoding="utf-8")
          print(f"expected_promotions_count={len(expected)}")
          if failed:
            print("Promotion failures detected for eligible metadata:")
            for rel, reason, details in failed:
              print(f"- metadata_file={rel} reason={reason} details={details}")
            raise SystemExit(1)
          with Path("/tmp/prod_expected_count.env").open("w", encoding="utf-8") as f:
            f.write(f"PROD_EXPECTED_PROMOTION_COUNT={len(expected)}\n")
          PY
          cat /tmp/prod_expected_count.env >> "$GITHUB_ENV"

      - name: Validate prod metadata
        run: |
          python eval-src/scripts/metadata/validate_metadata.py --root prod-worktree

      - name: Guard legacy store is unchanged
        shell: bash
        run: |
          cd prod-worktree
          if git diff --name-only | grep -x "airflow/web_app_data/pipeline_versions_store.json" >/dev/null; then
            echo "ERROR: legacy store must not be modified: airflow/web_app_data/pipeline_versions_store.json"
            exit 1
          fi

      - name: Commit prod updates
        shell: bash
        run: |
          set -euo pipefail
          cd prod-worktree
          if git diff --quiet -- dags airflow/web_app_data/metadata; then
            echo "No prod changes to commit"
            if [ "${PROD_EXPECTED_PROMOTION_COUNT:-0}" -gt 0 ]; then
              unresolved=0
              while IFS= read -r meta_file; do
                [ -z "$meta_file" ] && continue
                if [ ! -f "$meta_file" ]; then
                  echo "Missing expected metadata in prod worktree: $meta_file"
                  unresolved=1
                  continue
                fi
                status=$(python -c "import json,sys;d=json.load(open(sys.argv[1],encoding='utf-8'));print(str(d.get('promotion_status') or '').strip().lower())" "$meta_file")
                echo "post-check metadata_file=$meta_file promotion_status=$status"
                if [ "$status" != "champion" ]; then
                  unresolved=1
                fi
              done < /tmp/prod_expected_promotions.txt
              if [ "$unresolved" -ne 0 ]; then
                echo "Promotable metadata detected but no prod commit was produced."
                exit 1
              fi
              echo "Promotable metadata already reflected in prod; idempotent no-op."
            fi
            echo "processed_count=0"
          else
            git add dags airflow/web_app_data/metadata
            git commit -m "Auto-promote eligible challengers to prod champion"
            git push origin prod
            echo "processed_count=${PROD_EXPECTED_PROMOTION_COUNT:-0}"
          fi

      - name: Verify promoted metadata on origin/prod
        shell: bash
        run: |
          set -euo pipefail
          if [ "${PROD_EXPECTED_PROMOTION_COUNT:-0}" -eq 0 ]; then
            exit 0
          fi
          cd prod-worktree
          git fetch origin prod
          while IFS= read -r meta_file; do
            [ -z "$meta_file" ] && continue
            if ! git show "origin/prod:$meta_file" >/tmp/prod_meta.json 2>/dev/null; then
              echo "Missing expected promoted metadata on origin/prod: $meta_file"
              exit 1
            fi
            status=$(python -c "import json,sys;print(str(json.load(sys.stdin).get('promotion_status') or '').strip().lower())" < /tmp/prod_meta.json)
            echo "origin/prod metadata_file=$meta_file promotion_status=$status"
            if [ "$status" != "champion" ]; then
              echo "origin/prod verification failed for $meta_file"
              exit 1
            fi
          done < /tmp/prod_expected_promotions.txt

      - name: Upload promotion decisions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promotion-decisions
          path: eval-src/evaluation-results/promotion-decisions.json
          retention-days: 30
