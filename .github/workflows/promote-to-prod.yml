name: Promote DAG to Prod

on:
  workflow_dispatch:
    inputs:
      pipeline_id:
        description: "Base pipeline ID"
        required: true
      version_id:
        description: "Version ID to promote to prod"
        required: true

permissions:
  contents: write

jobs:
  promote-to-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Configure Git
        run: |
          git config user.email "airflow-bot@example.com"
          git config user.name "Airflow Bot"

      - name: Create or checkout prod branch
        run: |
          git fetch origin prod 2>/dev/null || true
          if git rev-parse --verify origin/prod > /dev/null 2>&1; then
            git checkout -b prod origin/prod
          else
            git checkout --orphan prod
            git rm -rf .
            echo "# Production Branch" > README.md
            git add README.md
            git commit -m "Initialize prod branch"
          fi

      - name: Get DAG from eval branch
        id: eligibility
        continue-on-error: true
        run: |
          git fetch origin eval
          python scripts/promotion/check_promotion_eligibility.py \
            --root . \
            --pipeline-id "${{ github.event.inputs.pipeline_id }}" \
            --version-id "${{ github.event.inputs.version_id }}"

      - name: Copy DAG from eval branch to prod branch
        if: steps.eligibility.outcome == 'success'
        run: |
          python scripts/promotion/copy_dag_to_prod.py \
            --root . \
            --pipeline-id "${{ github.event.inputs.pipeline_id }}" \
            --version-id "${{ github.event.inputs.version_id }}" \
            --eval-branch eval \
            --prod-branch prod

      - name: Update metadata for promoted DAG
        if: steps.eligibility.outcome == 'success'
        run: |
          python scripts/metadata/update_pipeline_metadata.py promote \
            --store airflow/web_app_data/pipeline_versions_store.json \
            --pipeline-id "${{ github.event.inputs.pipeline_id }}" \
            --version-id "${{ github.event.inputs.version_id }}" \
            --promotion-status champion

      - name: Commit prod metadata updates
        if: steps.eligibility.outcome == 'success'
        run: |
          if git diff --quiet -- airflow/web_app_data/pipeline_versions_store.json; then
            echo "No metadata changes to commit"
          else
            git add airflow/web_app_data/pipeline_versions_store.json
            git commit -m "Promote ${{ github.event.inputs.pipeline_id }}/${{ github.event.inputs.version_id }} metadata to champion"
          fi

      - name: Push prod branch
        if: steps.eligibility.outcome == 'success'
        run: |
          git push origin prod

      - name: Write eligibility decision artifact
        if: steps.eligibility.outcome != 'success'
        run: |
          mkdir -p evaluation-results
          cat > evaluation-results/promotion-eligibility.json << 'EOF'
          {
            "pipeline_id": "${{ github.event.inputs.pipeline_id }}",
            "version_id": "${{ github.event.inputs.version_id }}",
            "eligible": false,
            "reason": "blocked_by_score_policy"
          }
          EOF

      - name: Upload eligibility artifact
        if: steps.eligibility.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: promotion-eligibility-${{ github.event.inputs.pipeline_id }}-${{ github.event.inputs.version_id }}
          path: evaluation-results/promotion-eligibility.json
