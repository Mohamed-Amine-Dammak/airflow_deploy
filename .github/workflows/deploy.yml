name: Web App CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - "web_app/**"

  push:
    branches:
      - main
    paths:
      - "web_app/**"

env:
  ACR_LOGIN_SERVER: oliveairflow.azurecr.io
  IMAGE_NAME: web_app

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker build
        run: |
          docker build ./web_app

  build-and-deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} \
            -t $ACR_LOGIN_SERVER/$IMAGE_NAME:latest \
            ./web_app

      - name: Push image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/APACHE-AIRFLOW/airflow
            ./deploy_web_app.sh ${{ github.sha }}
