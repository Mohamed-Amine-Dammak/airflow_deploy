name: Evaluate DAG

on:
  workflow_dispatch:
    inputs:
      pipeline_id:
        description: "Base pipeline ID"
        required: true
      dag_id:
        description: "DAG ID to evaluate"
        required: true
      evaluation_mode:
        description: "Evaluation mode (static_only, run_once, run_multiple)"
        required: true
        default: "static_only"
      run_count:
        description: "Number of runs for evaluation (default: 1)"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  evaluate-dag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Run DAG evaluation
        run: |
          python scripts/evaluation/evaluate_dag.py \
            --root . \
            --pipeline-id "${{ github.event.inputs.pipeline_id }}" \
            --dag-id "${{ github.event.inputs.dag_id }}" \
            --evaluation-mode "${{ github.event.inputs.evaluation_mode }}" \
            --run-count "${{ github.event.inputs.run_count }}"
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}

      - name: Persist evaluation metadata updates
        run: |
          git config user.email "airflow-bot@example.com"
          git config user.name "Airflow Bot"
          if git diff --quiet -- web_app/pipeline_versions_store.json; then
            echo "No metadata changes to commit"
          else
            git add web_app/pipeline_versions_store.json
            git commit -m "Update evaluation score for ${{ github.event.inputs.pipeline_id }} / ${{ github.event.inputs.dag_id }}"
            git push origin HEAD
          fi

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results-${{ github.event.inputs.dag_id }}
          path: evaluation-results/
          retention-days: 30
