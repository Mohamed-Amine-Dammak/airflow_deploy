name: Evaluate DAG

on:
  push:
    branches:
      - eval
    paths:
      - "airflow/web_app_data/metadata/**/*.json"
      - "dags/**/*.py"
  workflow_dispatch:
    inputs:
      metadata_file:
        description: "Optional metadata file for manual recovery"
        required: false
      evaluation_mode:
        description: "Optional mode override (default run_once)"
        required: false
      run_count:
        description: "Optional run count override (default 1)"
        required: false
      airflow_api_version:
        description: "Optional API version override (default v2)"
        required: false
  workflow_run:
    workflows: ["Promote Changed Metadata to Eval"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evaluate-dag-runtime:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted]
    defaults:
      run:
        shell: powershell

    steps:
      - name: Debug runner shell
        run: |
          $ErrorActionPreference = "Stop"
          Write-Output "Runner OS: $env:RUNNER_OS"
          Write-Output "Shell: PowerShell"

      - name: Checkout eval
        uses: actions/checkout@v4
        with:
          ref: eval
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Resolve evaluation settings
        run: |
          $ErrorActionPreference = "Stop"
          $evalMode = "${{ github.event.inputs.evaluation_mode }}"
          $evalCount = "${{ github.event.inputs.run_count }}"
          $apiVersion = "${{ github.event.inputs.airflow_api_version }}"
          if ([string]::IsNullOrWhiteSpace($evalMode)) { $evalMode = "run_once" }
          if ([string]::IsNullOrWhiteSpace($evalCount)) { $evalCount = "1" }
          if ([string]::IsNullOrWhiteSpace($apiVersion)) { $apiVersion = "v2" }
          "EVAL_MODE=$evalMode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EVAL_COUNT=$evalCount" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "API_VERSION=$apiVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $metaFile = Join-Path $env:RUNNER_TEMP "eval_metadata.txt"
          "EVAL_METADATA_FILE=$metaFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Detect changed metadata
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $manual = "${{ github.event.inputs.metadata_file }}"
          $outFile = "$env:EVAL_METADATA_FILE"
          if ([string]::IsNullOrWhiteSpace($outFile)) { $outFile = "changed_metadata_files.txt" }

          if (-not [string]::IsNullOrWhiteSpace($manual)) {
            Write-Output "Manual metadata file: $manual"
            $manual | Out-File -FilePath $outFile -Encoding utf8
          }
          else {
            Write-Output "Detecting changed metadata files from git diff..."
            $files = git diff --name-only HEAD~1 HEAD |
              Where-Object { $_ -like "airflow/web_app_data/metadata/*.json" -or $_ -like "airflow/web_app_data/metadata/*/*.json" }

            if ($null -eq $files -or $files.Count -eq 0) {
              Write-Output "No changed metadata files found."
              "" | Out-File -FilePath $outFile -Encoding utf8
            }
            else {
              $files | Out-File -FilePath $outFile -Encoding utf8
            }
          }

          Write-Output "Detected metadata files:"
          Get-Content $outFile

      - name: Filter eval-ready metadata and enforce processed_count
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $inFile = "$env:EVAL_METADATA_FILE"
          if (-not (Test-Path $inFile)) {
            Write-Output "No eval metadata to evaluate."
            exit 1
          }
          $readyFile = Join-Path $env:RUNNER_TEMP "eval_ready_metadata.txt"
          if (Test-Path $readyFile) { Remove-Item $readyFile -Force }
          $processed = 0
          $rows = Get-Content $inFile
          foreach ($m in $rows) {
            if ([string]::IsNullOrWhiteSpace($m)) { continue }
            $rel = "$m".Trim()
            $candidatePaths = @(
              $rel,
              ($rel -replace '^[\.\\/]+', ''),
              ("./" + ($rel -replace '^[\.\\/]+', ''))
            )
            if ($rel -match '^[\\/]?web_app_data\/') {
              $trimmed = $rel -replace '^[\\/]+', ''
              $candidatePaths += @("airflow/$trimmed", "./airflow/$trimmed")
            }
            $resolved = $null
            foreach ($p in ($candidatePaths | Select-Object -Unique)) {
              if (Test-Path $p) { $resolved = $p; break }
            }
            if ([string]::IsNullOrWhiteSpace($resolved)) {
              Write-Output "metadata_file=$rel"
              Write-Output "selected=false reason=file_not_found_on_eval_branch"
              continue
            }

            try {
              $payload = Get-Content $resolved -Raw | ConvertFrom-Json
            }
            catch {
              Write-Output "metadata_file=$rel"
              Write-Output "resolved_path=$resolved"
              Write-Output "selected=false reason=invalid_json"
              continue
            }

            $pipelineId = "$($payload.pipeline_id)".Trim()
            $versionId = "$($payload.version_id)".Trim()
            $dagFile = "$($payload.git_dag_file)".Trim()
            $publish = "$($payload.publish_status)".Trim().ToLowerInvariant()
            $promotion = "$($payload.promotion_status)".Trim().ToLowerInvariant()
            Write-Output "metadata_file=$rel"
            Write-Output "resolved_path=$resolved"
            Write-Output "pipeline_id=$pipelineId"
            Write-Output "version_id=$versionId"
            Write-Output "git_dag_file=$dagFile"
            Write-Output "publish_status=$publish"
            Write-Output "promotion_status=$promotion"

            if ($promotion -eq "eval") {
              $resolved | Out-File -FilePath $readyFile -Encoding utf8 -Append
              $processed += 1
              Write-Output "selected=true reason=promotion_status_eval"
            }
            else {
              Write-Output "selected=false reason=promotion_status_$promotion"
            }
          }
          "EVAL_METADATA_FILE=$readyFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "processed_count=$processed"
          if ($processed -eq 0) {
            Write-Output "No eval metadata to evaluate."
            exit 1
          }

      - name: Get Airflow JWT token for API v2
        if: ${{ env.API_VERSION == 'v2' }}
        shell: powershell
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          $base = "$env:AIRFLOW_API_BASE_URL".TrimEnd('/')
          $payload = @{ username = "$env:AIRFLOW_API_USERNAME"; password = "$env:AIRFLOW_API_PASSWORD" } | ConvertTo-Json -Compress
          $resp = Invoke-RestMethod -Method Post -Uri "$base/auth/token" -ContentType "application/json" -Body $payload
          $token = "$($resp.access_token)".Trim()
          if ([string]::IsNullOrWhiteSpace($token)) { throw "JWT access_token missing in /auth/token response" }
          Write-Output "::add-mask::$token"
          "AIRFLOW_API_TOKEN=$token" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Debug Airflow DAG endpoint before evaluation
        if: ${{ env.API_VERSION == 'v2' }}
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_TOKEN: ${{ env.AIRFLOW_API_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $metaFile = "$env:EVAL_METADATA_FILE"
          if (-not (Test-Path $metaFile)) { exit 0 }
          $rows = Get-Content $metaFile
          foreach ($m in $rows) {
            if ([string]::IsNullOrWhiteSpace($m)) { continue }
            $payload = Get-Content $m -Raw | ConvertFrom-Json
            $dag = "$($payload.git_dag_id)"
            if ([string]::IsNullOrWhiteSpace($dag)) { continue }
            Invoke-RestMethod "$env:AIRFLOW_API_BASE_URL/api/v2/dags/$dag" -Headers @{Authorization="Bearer $env:AIRFLOW_API_TOKEN"} | Out-Null
            Write-Output "Airflow DAG preflight OK for $dag"
          }

      - name: Run runtime evaluation for changed metadata
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
          AIRFLOW_API_TOKEN: ${{ env.AIRFLOW_API_TOKEN }}
          AIRFLOW_API_VERSION: ${{ env.API_VERSION }}
          AIRFLOW_EVAL_TIMEOUT_SECONDS: "600"
        run: |
          $ErrorActionPreference = "Stop"
          $cmd = @("python", "scripts/evaluation/evaluate_changed_metadata.py", "--root", ".", "--evaluation-mode", "$env:EVAL_MODE", "--run-count", "$env:EVAL_COUNT")
          if (Test-Path "$env:EVAL_METADATA_FILE") {
            $rows = Get-Content "$env:EVAL_METADATA_FILE"
            foreach ($f in $rows) {
              if ([string]::IsNullOrWhiteSpace($f)) { continue }
              $cmd += @("--metadata-file", "$f")
            }
          }
          & $cmd[0] $cmd[1..($cmd.Length-1)]
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate metadata after evaluation
        run: |
          $ErrorActionPreference = "Stop"
          python scripts/metadata/validate_metadata.py --root .

      - name: Guard legacy store is unchanged
        run: |
          $ErrorActionPreference = "Stop"
          $changed = git diff --name-only
          if ($changed -contains "airflow/web_app_data/pipeline_versions_store.json") {
            Write-Error "ERROR: legacy store must not be modified: airflow/web_app_data/pipeline_versions_store.json"
            exit 1
          }

      - name: Commit eval metadata updates
        run: |
          $ErrorActionPreference = "Stop"
          git diff --quiet -- airflow/web_app_data/metadata evaluation-results
          if ($LASTEXITCODE -eq 0) {
            Write-Output "No eval metadata changes to commit"
          } else {
            git config user.email "airflow-bot@example.com"
            git config user.name "Airflow Bot"
            git add airflow/web_app_data/metadata evaluation-results
            git commit -m "Auto-evaluate changed DAG metadata"
            git push origin eval
          }

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results-auto
          path: evaluation-results/
          retention-days: 30

