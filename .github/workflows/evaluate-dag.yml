name: Evaluate DAG

on:
  push:
    branches:
      - eval
    paths:
      - "airflow/web_app_data/metadata/**/*.json"
      - "dags/**/*.py"
  workflow_dispatch:
    inputs:
      metadata_file:
        description: "Optional metadata file for manual recovery"
        required: false
      evaluation_mode:
        description: "Optional mode override (default run_once)"
        required: false
      run_count:
        description: "Optional run count override (default 1)"
        required: false
      airflow_api_version:
        description: "Optional API version override (default v2)"
        required: false
  workflow_run:
    workflows: ["Promote Changed Metadata to Eval"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evaluate-dag-runtime:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted]

    steps:
      - name: Checkout eval
        uses: actions/checkout@v4
        with:
          ref: eval
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Resolve evaluation settings
        shell: bash
        run: |
          echo "EVAL_MODE=${{ github.event.inputs.evaluation_mode }}" >> $GITHUB_ENV
          echo "EVAL_COUNT=${{ github.event.inputs.run_count }}" >> $GITHUB_ENV
          echo "API_VERSION=${{ github.event.inputs.airflow_api_version }}" >> $GITHUB_ENV
          if [ -z "${{ github.event.inputs.evaluation_mode }}" ]; then echo "EVAL_MODE=run_once" >> $GITHUB_ENV; fi
          if [ -z "${{ github.event.inputs.run_count }}" ]; then echo "EVAL_COUNT=1" >> $GITHUB_ENV; fi
          if [ -z "${{ github.event.inputs.airflow_api_version }}" ]; then echo "API_VERSION=v2" >> $GITHUB_ENV; fi

      - name: Detect changed metadata rows
        shell: bash
        run: |
          : > /tmp/eval_metadata.txt
          if [ -n "${{ github.event.inputs.metadata_file }}" ]; then
            echo "${{ github.event.inputs.metadata_file }}" > /tmp/eval_metadata.txt
          else
            git diff --name-only HEAD~1 HEAD | grep '^airflow/web_app_data/metadata/.*/.*\.json$' > /tmp/eval_metadata.txt || true
          fi
          echo "Detected metadata files:"
          if [ -s /tmp/eval_metadata.txt ]; then sed 's/^/- /' /tmp/eval_metadata.txt; else echo "- <none>"; fi

      - name: Get Airflow JWT token for API v2
        if: ${{ env.API_VERSION == 'v2' }}
        shell: powershell
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
        run: |
          $base = "$env:AIRFLOW_API_BASE_URL".TrimEnd('/')
          $payload = @{ username = "$env:AIRFLOW_API_USERNAME"; password = "$env:AIRFLOW_API_PASSWORD" } | ConvertTo-Json -Compress
          $resp = Invoke-RestMethod -Method Post -Uri "$base/auth/token" -ContentType "application/json" -Body $payload
          $token = "$($resp.access_token)".Trim()
          if ([string]::IsNullOrWhiteSpace($token)) { throw "JWT access_token missing in /auth/token response" }
          Write-Output "::add-mask::$token"
          "AIRFLOW_API_TOKEN=$token" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Debug Airflow DAG endpoint before evaluation
        if: ${{ env.API_VERSION == 'v2' }}
        shell: powershell
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_TOKEN: ${{ env.AIRFLOW_API_TOKEN }}
        run: |
          if (-not (Test-Path /tmp/eval_metadata.txt)) { exit 0 }
          $rows = Get-Content /tmp/eval_metadata.txt
          foreach ($m in $rows) {
            if ([string]::IsNullOrWhiteSpace($m)) { continue }
            $payload = Get-Content $m -Raw | ConvertFrom-Json
            $dag = "$($payload.git_dag_id)"
            if ([string]::IsNullOrWhiteSpace($dag)) { continue }
            Invoke-RestMethod "$env:AIRFLOW_API_BASE_URL/api/v2/dags/$dag" -Headers @{Authorization="Bearer $env:AIRFLOW_API_TOKEN"} | Out-Null
            Write-Output "Airflow DAG preflight OK for $dag"
          }

      - name: Run runtime evaluation for changed metadata
        shell: bash
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
          AIRFLOW_API_TOKEN: ${{ env.AIRFLOW_API_TOKEN }}
          AIRFLOW_API_VERSION: ${{ env.API_VERSION }}
          AIRFLOW_EVAL_TIMEOUT_SECONDS: "600"
        run: |
          CMD=(python scripts/evaluation/evaluate_changed_metadata.py --root . --evaluation-mode "$EVAL_MODE" --run-count "$EVAL_COUNT")
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            CMD+=(--metadata-file "$f")
          done < /tmp/eval_metadata.txt
          "${CMD[@]}"

      - name: Validate metadata after evaluation
        run: |
          python scripts/metadata/validate_metadata.py --root .

      - name: Guard legacy store is unchanged
        shell: bash
        run: |
          if git diff --name-only | grep -x "airflow/web_app_data/pipeline_versions_store.json" >/dev/null; then
            echo "ERROR: legacy store must not be modified: airflow/web_app_data/pipeline_versions_store.json"
            exit 1
          fi

      - name: Commit eval metadata updates
        shell: bash
        run: |
          if git diff --quiet -- airflow/web_app_data/metadata evaluation-results; then
            echo "No eval metadata changes to commit"
          else
            git config user.email "airflow-bot@example.com"
            git config user.name "Airflow Bot"
            git add airflow/web_app_data/metadata evaluation-results
            git commit -m "Auto-evaluate changed DAG metadata"
            git push origin eval
          fi

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results-auto
          path: evaluation-results/
          retention-days: 30

