name: Evaluate DAG

on:
  workflow_dispatch:
    inputs:
      pipeline_id:
        description: "Base pipeline ID"
        required: true
      dag_id:
        description: "DAG ID to evaluate"
        required: true
      evaluation_mode:
        description: "Evaluation mode (static_only, run_once, run_multiple)"
        required: true
        default: "static_only"
      run_count:
        description: "Number of runs for evaluation (default: 1)"
        required: false
        default: "1"
      airflow_api_version:
        description: "Airflow API version to use for runtime calls (v1 or v2)"
        required: false
        default: "v2"

permissions:
  contents: write

concurrency:
  group: metadata-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evaluate-dag-static:
    if: ${{ github.event.inputs.evaluation_mode == 'static_only' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: eval
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Run DAG runtime evaluation
        shell: powershell
        run: python scripts/evaluation/evaluate_dag.py --root . --pipeline-id "${{ github.event.inputs.pipeline_id }}" --dag-id "${{ github.event.inputs.dag_id }}" --evaluation-mode "${{ github.event.inputs.evaluation_mode }}" --run-count "${{ github.event.inputs.run_count }}"
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}

      - name: Validate metadata after scoring update
        run: |
          python scripts/metadata/validate_metadata.py --root .

      - name: Guard legacy store is unchanged
        shell: powershell
        run: |
          $changed = git diff --name-only
          if ($changed -contains "airflow/web_app_data/pipeline_versions_store.json") {
            Write-Error "ERROR: legacy store must not be modified: airflow/web_app_data/pipeline_versions_store.json"
            exit 1
          }

      - name: Persist evaluation metadata updates
        run: |
          git config user.email "airflow-bot@example.com"
          git config user.name "Airflow Bot"
          if git diff --quiet -- airflow/web_app_data/metadata; then
            echo "No metadata changes to commit"
          else
            git add airflow/web_app_data/metadata
            git commit -m "Update evaluation score for ${{ github.event.inputs.pipeline_id }} / ${{ github.event.inputs.dag_id }}"
            git push origin eval
          fi

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results-${{ github.event.inputs.dag_id }}
          path: evaluation-results/
          retention-days: 30

  evaluate-dag-runtime:
    if: ${{ github.event.inputs.evaluation_mode == 'run_once' || github.event.inputs.evaluation_mode == 'run_multiple' }}
    runs-on: [self-hosted]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: eval
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Select Airflow API path version
        shell: powershell
        run: |
          $version = "${{ github.event.inputs.airflow_api_version }}"
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "v2" }
          if ($version -ne "v1" -and $version -ne "v2") {
            Write-Error "Invalid airflow_api_version: $version (expected v1 or v2)"
            exit 1
          }
          $clientPath = "scripts/evaluation/airflow_client.py"
          $content = Get-Content -Raw $clientPath
          if ($version -eq "v2") {
            $content = $content.Replace("/api/v1/dags/", "/api/v2/dags/")
          } else {
            $content = $content.Replace("/api/v2/dags/", "/api/v1/dags/")
          }
          Set-Content -Path $clientPath -Value $content -Encoding UTF8
          Write-Output "Using Airflow API version: $version"

      - name: Get Airflow JWT token for API v2
        if: ${{ github.event.inputs.airflow_api_version == 'v2' || github.event.inputs.airflow_api_version == '' }}
        shell: powershell
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
        run: |
          $base = "$env:AIRFLOW_API_BASE_URL".TrimEnd('/')
          if ([string]::IsNullOrWhiteSpace($base)) { throw "AIRFLOW_API_BASE_URL is empty" }
          $payload = @{ username = "$env:AIRFLOW_API_USERNAME"; password = "$env:AIRFLOW_API_PASSWORD" } | ConvertTo-Json -Compress
          try {
            $resp = Invoke-RestMethod -Method Post -Uri "$base/auth/token" -ContentType "application/json" -Body $payload
          } catch {
            throw "Failed to obtain JWT from $base/auth/token : $($_.Exception.Message)"
          }
          $token = "$($resp.access_token)".Trim()
          if ([string]::IsNullOrWhiteSpace($token)) { throw "JWT access_token missing in /auth/token response" }
          Write-Output "::add-mask::$token"
          "AIRFLOW_API_TOKEN=$token" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run DAG runtime evaluation
        shell: powershell
        run: python scripts/evaluation/evaluate_dag.py --root . --pipeline-id "${{ github.event.inputs.pipeline_id }}" --dag-id "${{ github.event.inputs.dag_id }}" --evaluation-mode "${{ github.event.inputs.evaluation_mode }}" --run-count "${{ github.event.inputs.run_count }}"
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
          AIRFLOW_API_TOKEN: ${{ env.AIRFLOW_API_TOKEN }}

      - name: Validate metadata after scoring update
        run: |
          python scripts/metadata/validate_metadata.py --root .

      - name: Guard legacy store is unchanged
        shell: powershell
        run: |
          $changed = git diff --name-only
          if ($changed -contains "airflow/web_app_data/pipeline_versions_store.json") {
            Write-Error "ERROR: legacy store must not be modified: airflow/web_app_data/pipeline_versions_store.json"
            exit 1
          }

      - name: Persist evaluation metadata updates
        shell: powershell
        run: |
          git config user.email "airflow-bot@example.com"
          git config user.name "Airflow Bot"
          git diff --quiet -- airflow/web_app_data/metadata
          if ($LASTEXITCODE -eq 0) {
            Write-Output "No metadata changes to commit"
          } else {
            git add airflow/web_app_data/metadata
            git commit -m "Update runtime evaluation score for ${{ github.event.inputs.pipeline_id }} / ${{ github.event.inputs.dag_id }}"
            git push origin eval
          }

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results-${{ github.event.inputs.dag_id }}
          path: evaluation-results/
          retention-days: 30
