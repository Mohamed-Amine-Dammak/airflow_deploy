name: Evaluate DAG

on:
  workflow_run:
    workflows: ["Promote Changed Metadata to Eval"]
    types: [completed]
  workflow_dispatch:
    inputs:
      metadata_file:
        description: "Optional metadata file for manual recovery"
        required: false
      evaluation_mode:
        description: "Optional mode override (default run_once)"
        required: false
      run_count:
        description: "Optional run count override (default 1)"
        required: false
      airflow_api_version:
        description: "Optional API version override (default v2)"
        required: false

permissions:
  contents: write
  actions: read

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evaluate-dag-runtime:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted]
    defaults:
      run:
        shell: powershell

    steps:
      - name: Debug runner shell
        run: |
          $ErrorActionPreference = "Stop"
          Write-Output "Runner OS: $env:RUNNER_OS"
          Write-Output "Shell: PowerShell"
          Write-Output "trigger_source=${{ github.event_name }}"
          if ("${{ github.event_name }}" -eq "workflow_run") {
            Write-Output "triggering_workflow=${{ github.event.workflow_run.name }}"
            Write-Output "triggering_run_id=${{ github.event.workflow_run.id }}"
            Write-Output "triggering_head_sha=${{ github.event.workflow_run.head_sha }}"
          }

      - name: Checkout eval
        uses: actions/checkout@v4
        with:
          ref: eval
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Resolve evaluation settings
        run: |
          $ErrorActionPreference = "Stop"
          $evalMode = "${{ github.event.inputs.evaluation_mode }}"
          $evalCount = "${{ github.event.inputs.run_count }}"
          $apiVersion = "${{ github.event.inputs.airflow_api_version }}"
          if ([string]::IsNullOrWhiteSpace($evalMode)) { $evalMode = "run_once" }
          if ([string]::IsNullOrWhiteSpace($evalCount)) { $evalCount = "1" }
          if ([string]::IsNullOrWhiteSpace($apiVersion)) { $apiVersion = "v2" }
          "EVAL_MODE=$evalMode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EVAL_COUNT=$evalCount" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "API_VERSION=$apiVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $metaFile = Join-Path $env:RUNNER_TEMP "eval_metadata_candidates.txt"
          $readyFile = Join-Path $env:RUNNER_TEMP "eval_ready_metadata.txt"
          $evaluatedFile = Join-Path $env:RUNNER_TEMP "eval_evaluated_metadata.txt"
          "EVAL_METADATA_FILE=$metaFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EVAL_READY_FILE=$readyFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "EVALUATED_METADATA_FILE=$evaluatedFile" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download eval promotion lifecycle artifact
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: eval-promotion-lifecycle
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: promote-lifecycle

      - name: Build candidate metadata file list
        run: |
          $ErrorActionPreference = "Stop"
          $outFile = "$env:EVAL_METADATA_FILE"
          if (Test-Path $outFile) { Remove-Item $outFile -Force }
          New-Item -ItemType File -Path $outFile -Force | Out-Null

          $eventName = "${{ github.event_name }}"
          $source = ""

          if ($eventName -eq "workflow_dispatch") {
            $manual = "${{ github.event.inputs.metadata_file }}"
            if (-not [string]::IsNullOrWhiteSpace($manual)) {
              $manual.Trim().Replace('\\','/') | Out-File -FilePath $outFile -Encoding utf8
              $source = "manual_input"
            }
            else {
              $all = Get-ChildItem -Path airflow/web_app_data/metadata -Recurse -File -Filter *.json -ErrorAction SilentlyContinue |
                ForEach-Object { $_.FullName.Replace((Resolve-Path .).Path + '\\','').Replace('\\','/') }
              $all | Out-File -FilePath $outFile -Encoding utf8
              $source = "manual_scan_all"
            }
          }
          else {
            $artifactFile = "promote-lifecycle/eval_promoted_metadata_files.txt"
            if (Test-Path $artifactFile) {
              $rows = Get-Content $artifactFile | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
              if ($rows.Count -gt 0) {
                $rows | Out-File -FilePath $outFile -Encoding utf8
                $source = "promote_artifact"
              }
            }

            if ([string]::IsNullOrWhiteSpace($source)) {
              $source = "fallback_git_diff"
              git fetch origin eval
              $runSha = "${{ github.event.workflow_run.head_sha }}"
              if (-not [string]::IsNullOrWhiteSpace($runSha)) {
                $files = git show --name-only --pretty="" $runSha
                $files = @($files | Where-Object { $_ -like "airflow/web_app_data/metadata/*/*.json" } | Select-Object -Unique)
                if ($files.Count -gt 0) {
                  $files | Out-File -FilePath $outFile -Encoding utf8
                }
              }
            }
          }

          $rows2 = @()
          if (Test-Path $outFile) {
            $rows2 = @(Get-Content $outFile | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | ForEach-Object { $_.Trim() } | Select-Object -Unique)
          }
          $rows2 | Out-File -FilePath $outFile -Encoding utf8
          $detected = $rows2.Count

          "DETECTED_METADATA_COUNT=$detected" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "METADATA_SOURCE=$source" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Output "metadata_source=$source"
          Write-Output "received_count=$detected"
          Write-Output "metadata files received:"
          if ($detected -eq 0) {
            Write-Output "- <none>"
          }
          else {
            Get-Content $outFile | ForEach-Object { Write-Output "- $_" }
          }

      - name: Filter eval-ready metadata and enforce processed_count
        run: |
          $ErrorActionPreference = "Stop"
          $inFile = "$env:EVAL_METADATA_FILE"
          $readyFile = "$env:EVAL_READY_FILE"
          if (Test-Path $readyFile) { Remove-Item $readyFile -Force }
          New-Item -ItemType File -Path $readyFile -Force | Out-Null

          $rows = @()
          if (Test-Path $inFile) {
            $rows = @(Get-Content $inFile | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          }

          $processed = 0
          foreach ($m in $rows) {
            $rel = "$m".Trim().Replace('\\','/')
            $candidatePaths = @(
              $rel,
              ($rel -replace '^[\.\/]+', ''),
              ("./" + ($rel -replace '^[\.\/]+', ''))
            )
            if ($rel -match '^[\/]?web_app_data/') {
              $trimmed = $rel -replace '^[\/]+', ''
              $candidatePaths += @("airflow/$trimmed", "./airflow/$trimmed")
            }
            $resolved = $null
            foreach ($p in ($candidatePaths | Select-Object -Unique)) {
              if (Test-Path $p) { $resolved = $p; break }
            }
            if ([string]::IsNullOrWhiteSpace($resolved)) {
              Write-Output "metadata_file=$rel"
              Write-Output "selected=false reason=file_not_found_on_eval_branch"
              continue
            }

            try { $payload = Get-Content $resolved -Raw | ConvertFrom-Json }
            catch {
              Write-Output "metadata_file=$rel"
              Write-Output "resolved_path=$resolved"
              Write-Output "selected=false reason=invalid_json"
              continue
            }

            $pipelineId = "$($payload.pipeline_id)".Trim()
            $versionId = "$($payload.version_id)".Trim()
            $dagFile = "$($payload.git_dag_file)".Trim()
            $publish = "$($payload.publish_status)".Trim().ToLowerInvariant()
            $promotion = "$($payload.promotion_status)".Trim().ToLowerInvariant()
            Write-Output "metadata_file=$rel"
            Write-Output "resolved_path=$resolved"
            Write-Output "pipeline_id=$pipelineId"
            Write-Output "version_id=$versionId"
            Write-Output "git_dag_file=$dagFile"
            Write-Output "publish_status=$publish"
            Write-Output "promotion_status=$promotion"

            if ($publish -eq "merged_to_git" -and ($promotion -eq "eval" -or $promotion -eq "challenger")) {
              $resolved | Out-File -FilePath $readyFile -Encoding utf8 -Append
              $processed += 1
              if ($promotion -eq "eval") {
                Write-Output "selected=true reason=publish_merged_promotion_eval"
              } else {
                Write-Output "selected=true reason=publish_merged_promotion_challenger_recheck"
              }
            }
            else {
              Write-Output "selected=false reason=status_mismatch"
            }
          }

          "PROCESSED_COUNT=$processed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "processed_count=$processed"

          $detected = [int]("${env:DETECTED_METADATA_COUNT}")
          if ($processed -eq 0) {
            if ("${{ github.event_name }}" -eq "workflow_run" -and $detected -gt 0) {
              Write-Output "Automatic run had expected metadata but no eval-ready files were selected."
              exit 1
            }
            Write-Output "No eval metadata to evaluate in this run."
            exit 0
          }

      - name: Get Airflow JWT token for API v2
        if: ${{ env.API_VERSION == 'v2' }}
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          $base = "$env:AIRFLOW_API_BASE_URL".TrimEnd('/')
          $payload = @{ username = "$env:AIRFLOW_API_USERNAME"; password = "$env:AIRFLOW_API_PASSWORD" } | ConvertTo-Json -Compress
          $resp = Invoke-RestMethod -Method Post -Uri "$base/auth/token" -ContentType "application/json" -Body $payload
          $token = "$($resp.access_token)".Trim()
          if ([string]::IsNullOrWhiteSpace($token)) { throw "JWT access_token missing in /auth/token response" }
          Write-Output "::add-mask::$token"
          "AIRFLOW_API_TOKEN=$token" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Debug Airflow DAG endpoint before evaluation
        if: ${{ env.API_VERSION == 'v2' }}
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_TOKEN: ${{ env.AIRFLOW_API_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $metaFile = "$env:EVAL_READY_FILE"
          if (-not (Test-Path $metaFile)) { exit 0 }
          $rows = Get-Content $metaFile
          foreach ($m in $rows) {
            if ([string]::IsNullOrWhiteSpace($m)) { continue }
            $payload = Get-Content $m -Raw | ConvertFrom-Json
            $dag = "$($payload.git_dag_id)"
            if ([string]::IsNullOrWhiteSpace($dag)) { continue }
            Invoke-RestMethod "$env:AIRFLOW_API_BASE_URL/api/v2/dags/$dag" -Headers @{Authorization="Bearer $env:AIRFLOW_API_TOKEN"} | Out-Null
            Write-Output "Airflow DAG preflight OK for $dag"
          }

      - name: Run runtime evaluation for selected metadata
        env:
          AIRFLOW_API_BASE_URL: ${{ secrets.AIRFLOW_API_BASE_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
          AIRFLOW_API_TOKEN: ${{ env.AIRFLOW_API_TOKEN }}
          AIRFLOW_API_VERSION: ${{ env.API_VERSION }}
          AIRFLOW_EVAL_TIMEOUT_SECONDS: "600"
        run: |
          $ErrorActionPreference = "Stop"
          $cmd = @("python", "scripts/evaluation/evaluate_changed_metadata.py", "--root", ".", "--evaluation-mode", "$env:EVAL_MODE", "--run-count", "$env:EVAL_COUNT")
          if (Test-Path "$env:EVAL_READY_FILE") {
            $rows = Get-Content "$env:EVAL_READY_FILE"
            foreach ($f in $rows) {
              if ([string]::IsNullOrWhiteSpace($f)) { continue }
              $cmd += @("--metadata-file", "$f")
            }
          }
          & $cmd[0] $cmd[1..($cmd.Length-1)]
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate metadata after evaluation
        run: |
          $ErrorActionPreference = "Stop"
          python scripts/metadata/validate_metadata.py --root .

      - name: Verify eval lifecycle state after evaluation
        run: |
          $ErrorActionPreference = "Stop"
          $readyFile = "$env:EVAL_READY_FILE"
          $outFile = "$env:EVALUATED_METADATA_FILE"
          if (Test-Path $outFile) { Remove-Item $outFile -Force }
          New-Item -ItemType File -Path $outFile -Force | Out-Null

          $rows = @()
          if (Test-Path $readyFile) {
            $rows = @(Get-Content $readyFile | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
          }

          $okCount = 0
          foreach ($m in $rows) {
            $rel = "$m".Trim()
            $payload = Get-Content $rel -Raw | ConvertFrom-Json
            $promo = "$($payload.promotion_status)".Trim().ToLowerInvariant()
            $score = $payload.score
            Write-Output "metadata_file=$rel post_eval_promotion_status=$promo score=$score"
            if ($promo -ne "challenger") {
              throw "Evaluation lifecycle verification failed for $rel: promotion_status=$promo"
            }
            if ($null -eq $score -or [string]::IsNullOrWhiteSpace("$score")) {
              throw "Evaluation lifecycle verification failed for $rel: score is missing"
            }
            $rel | Out-File -FilePath $outFile -Encoding utf8 -Append
            $okCount += 1
          }

          "EVALUATED_COUNT=$okCount" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "processed_count=$okCount"

          if ("${{ github.event_name }}" -eq "workflow_run" -and [int]("${env:DETECTED_METADATA_COUNT}") -gt 0 -and $okCount -eq 0) {
            throw "Automatic evaluation run received metadata but produced no evaluated challenger files."
          }

      - name: Guard legacy store is unchanged
        run: |
          $ErrorActionPreference = "Stop"
          $changed = git diff --name-only
          if ($changed -contains "airflow/web_app_data/pipeline_versions_store.json") {
            Write-Error "ERROR: legacy store must not be modified: airflow/web_app_data/pipeline_versions_store.json"
            exit 1
          }

      - name: Commit eval metadata updates
        run: |
          $ErrorActionPreference = "Stop"
          git diff --quiet -- airflow/web_app_data/metadata evaluation-results
          if ($LASTEXITCODE -eq 0) {
            Write-Output "No eval metadata changes to commit"
            if ("${{ github.event_name }}" -eq "workflow_run" -and [int]("${env:EVALUATED_COUNT}") -gt 0) {
              Write-Error "Evaluation produced challenger metadata but no commit was created."
              exit 1
            }
          }
          else {
            git config user.email "airflow-bot@example.com"
            git config user.name "Airflow Bot"
            git add airflow/web_app_data/metadata evaluation-results
            git commit -m "Auto-evaluate changed DAG metadata"
            git push origin eval
          }

      - name: Build evaluation lifecycle artifact
        if: always()
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path lifecycle | Out-Null
          $metaOut = "lifecycle/evaluated_metadata_files.txt"
          if (Test-Path "$env:EVALUATED_METADATA_FILE") {
            Copy-Item "$env:EVALUATED_METADATA_FILE" $metaOut -Force
          }
          else {
            New-Item -ItemType File -Path $metaOut -Force | Out-Null
          }
          @(
            "trigger_source=${{ github.event_name }}",
            "metadata_source=$env:METADATA_SOURCE",
            "received_count=$env:DETECTED_METADATA_COUNT",
            "processed_count=$env:EVALUATED_COUNT"
          ) | Out-File -FilePath lifecycle/summary.txt -Encoding utf8

      - name: Upload evaluation lifecycle artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-evaluation-lifecycle
          path: lifecycle/
          retention-days: 30

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results-auto
          path: evaluation-results/
          retention-days: 30
