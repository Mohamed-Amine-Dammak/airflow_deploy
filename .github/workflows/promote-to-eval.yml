name: Promote DAG to Eval Branch

on:
  push:
    branches:
      - main
    paths:
      - "dags/**"
  workflow_dispatch:
    inputs:
      pipeline_id:
        description: "Base pipeline ID (optional; if omitted, all changed DAGs are promoted)"
        required: false
      dag_id:
        description: "DAG ID to mark as eval (e.g. pipeline__v4)"
        required: false

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: metadata-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote-to-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Configure Git
        run: |
          git config user.email "airflow-bot@example.com"
          git config user.name "Airflow Bot"

      - name: Create or checkout eval branch
        run: |
          git fetch origin eval 2>/dev/null || true
          if git rev-parse --verify origin/eval > /dev/null 2>&1; then
            git checkout -b eval origin/eval
          else
            git checkout --orphan eval
            git rm -rf .
            echo "# Eval Branch" > README.md
            git add README.md
            git commit -m "Initialize eval branch"
          fi

      - name: Merge main into eval
        run: |
          git merge origin/main --no-edit || true

      - name: Update metadata for eval DAGs
        run: |
          python scripts/metadata/update_pipeline_metadata.py mark_eval \
            --root . \
            --pipeline-id "${{ github.event.inputs.pipeline_id }}" \
            --dag-id "${{ github.event.inputs.dag_id }}"

      - name: Validate metadata JSON after eval update
        run: |
          python scripts/metadata/validate_metadata.py --root .

      - name: Guard legacy store is unchanged
        shell: bash
        run: |
          if git diff --name-only | grep -x "airflow/web_app_data/pipeline_versions_store.json" >/dev/null; then
            echo "ERROR: legacy store must not be modified: airflow/web_app_data/pipeline_versions_store.json"
            exit 1
          fi

      - name: Commit eval metadata updates
        run: |
          TARGET="airflow/web_app_data/metadata"
          if git diff --quiet -- "$TARGET"; then
            echo "No metadata changes to commit"
          else
            git add "$TARGET"
            git commit -m "Mark DAG metadata as eval"
          fi

      - name: Push eval branch
        run: |
          git push origin eval
