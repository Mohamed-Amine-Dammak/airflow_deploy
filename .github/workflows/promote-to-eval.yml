name: Promote Changed Metadata to Eval

on:
  push:
    branches:
      - main
    paths:
      - "airflow/web_app_data/metadata/**/*.json"
      - "dags/**/*.py"
  workflow_dispatch:
    inputs:
      metadata_file:
        description: "Optional metadata file for manual recovery (e.g. airflow/web_app_data/metadata/testops/v2.json)"
        required: false

permissions:
  contents: write

concurrency:
  group: metadata-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote-to-eval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main source
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: main-src

      - name: Checkout eval target
        uses: actions/checkout@v4
        with:
          ref: eval
          fetch-depth: 0
          path: eval-worktree
        continue-on-error: true

      - name: Ensure eval target exists
        shell: bash
        run: |
          if [ ! -d "eval-worktree/.git" ]; then
            mkdir -p eval-worktree
            cp -r main-src/.git eval-worktree/.git
            cd eval-worktree
            git checkout --orphan eval
            git rm -rf . || true
            echo "# Eval Branch" > README.md
            git add README.md
            git -c user.email="airflow-bot@example.com" -c user.name="Airflow Bot" commit -m "Initialize eval branch"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Git
        run: |
          cd eval-worktree
          git config user.email "airflow-bot@example.com"
          git config user.name "Airflow Bot"

      - name: Merge main into eval
        shell: bash
        run: |
          cd eval-worktree
          git fetch origin main
          git merge origin/main --no-edit || true

      - name: Detect metadata files to promote
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          cd main-src
          : > /tmp/metadata_files.txt
          if [ -n "${{ github.event.inputs.metadata_file }}" ]; then
            echo "${{ github.event.inputs.metadata_file }}" > /tmp/metadata_files.txt
          else
            git diff --name-only HEAD~1 HEAD | grep '^airflow/web_app_data/metadata/.*/.*\.json$' > /tmp/metadata_files.txt || true
          fi
          echo "Detected metadata files:"
          if [ -s /tmp/metadata_files.txt ]; then
            sed 's/^/- /' /tmp/metadata_files.txt
          else
            echo "- <none>"
          fi

      - name: Copy selected metadata and DAG files from main to eval
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s /tmp/metadata_files.txt ]; then
            exit 0
          fi
          cd eval-worktree
          while IFS= read -r meta_file; do
            [ -z "$meta_file" ] && continue
            mkdir -p "$(dirname "$meta_file")"
            git --git-dir=../main-src/.git show origin/main:"$meta_file" > "$meta_file"
            dag_file=$(python -c "import json,sys;print((json.load(open(sys.argv[1],encoding='utf-8')).get('git_dag_file') or '').strip())" "$meta_file")
            if [ -n "$dag_file" ]; then
              mkdir -p "$(dirname "$dag_file")"
              git --git-dir=../main-src/.git show origin/main:"$dag_file" > "$dag_file"
            fi
          done < /tmp/metadata_files.txt

      - name: Promote changed metadata files to eval
        shell: bash
        run: |
          set -euo pipefail
          cd eval-worktree
          if [ ! -s /tmp/metadata_files.txt ]; then
            echo "No changed metadata files detected; skipping promotion."
            exit 0
          fi
          CMD=(python scripts/promotion/promote_changed_metadata_to_eval.py --root .)
          while IFS= read -r meta_file; do
            [ -z "$meta_file" ] && continue
            CMD+=(--metadata-file "$meta_file")
          done < /tmp/metadata_files.txt
          "${CMD[@]}"

      - name: Guard legacy store is unchanged
        shell: bash
        run: |
          cd eval-worktree
          if git diff --name-only | grep -x "airflow/web_app_data/pipeline_versions_store.json" >/dev/null; then
            echo "ERROR: legacy store must not be modified: airflow/web_app_data/pipeline_versions_store.json"
            exit 1
          fi

      - name: Commit eval DAG and metadata updates
        shell: bash
        run: |
          cd eval-worktree
          if git diff --quiet -- dags airflow/web_app_data/metadata; then
            echo "No DAG/metadata changes to commit"
          else
            git add dags airflow/web_app_data/metadata
            git commit -m "Promote merged DAG metadata to eval"
          fi

      - name: Push eval branch
        shell: bash
        run: |
          cd eval-worktree
          git push origin eval
