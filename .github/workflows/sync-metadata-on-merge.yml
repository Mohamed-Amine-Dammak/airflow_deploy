name: Sync Metadata On Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-merged-pr-metadata:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update metadata for merged PR
        run: |
          python scripts/metadata/update_pipeline_metadata.py merged \
            --root . \
            --pr-number "${{ github.event.pull_request.number }}" \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --commit-sha "${{ github.event.pull_request.merge_commit_sha }}" \
            --pr-url "${{ github.event.pull_request.html_url }}" \
            --publish-status merged_to_git \
            --promotion-status submitted

      - name: Detect merged metadata files
        id: changed
        shell: bash
        run: |
          git show --name-only --pretty="" "${{ github.event.pull_request.merge_commit_sha }}" \
            | grep '^airflow/web_app_data/metadata/.*/.*\.json$' > /tmp/merged_metadata.txt || true
          echo "Merged metadata files:"
          if [ -s /tmp/merged_metadata.txt ]; then
            sed 's/^/- /' /tmp/merged_metadata.txt
          else
            echo "- <none>"
          fi

      - name: Log merged metadata transition (before/after)
        shell: bash
        run: |
          set -euo pipefail
          python - << 'PY'
          import json
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path(".").resolve()
          lines = []
          p = Path("/tmp/merged_metadata.txt")
          if p.exists():
              lines = [x.strip() for x in p.read_text(encoding="utf-8").splitlines() if x.strip()]
          meta_files = lines
          now = datetime.now(timezone.utc).isoformat()
          for rel in meta_files:
              path = root / rel
              payload = json.loads(path.read_text(encoding="utf-8"))
              before_promo = str(payload.get("promotion_status", "")).strip()
              before_publish = str(payload.get("publish_status", "")).strip()
              print(f"{rel} before: promotion_status={before_promo} publish_status={before_publish}")
              payload["publish_status"] = "merged_to_git"
              payload["updated_at"] = now
              payload["merged_at"] = now
              payload["merge_commit_sha"] = "${{ github.event.pull_request.merge_commit_sha }}"
              path.write_text(json.dumps(payload, indent=2), encoding="utf-8")
              after_promo = str(payload.get("promotion_status", "")).strip()
              after_publish = str(payload.get("publish_status", "")).strip()
              print(f"{rel} after: promotion_status={after_promo} publish_status={after_publish}")
          PY

      - name: Validate metadata JSON after merged update
        run: |
          python scripts/metadata/validate_metadata.py --root .

      - name: Fail if draft persisted after merge
        shell: bash
        run: |
          set -euo pipefail
          python - << 'PY'
          import json
          import subprocess
          from pathlib import Path

          root = Path(".").resolve()
          lines = []
          p = Path("/tmp/merged_metadata.txt")
          if p.exists():
              lines = [x.strip() for x in p.read_text(encoding="utf-8").splitlines() if x.strip()]
          meta_files = lines
          for rel in meta_files:
              payload = json.loads((root / rel).read_text(encoding="utf-8"))
              if str(payload.get("promotion_status", "")).strip().lower() == "draft":
                  raise SystemExit("metadata transition failed: draft state persisted after merge")
          PY

      - name: Show updated metadata files
        shell: bash
        run: |
          set -euo pipefail
          for f in $(cat /tmp/merged_metadata.txt 2>/dev/null || true); do
            echo "==== $f ===="
            cat "$f"
          done

      - name: Guard legacy store is unchanged
        shell: bash
        run: |
          if git diff --name-only | grep -x "airflow/web_app_data/pipeline_versions_store.json" >/dev/null; then
            echo "ERROR: legacy store must not be modified: airflow/web_app_data/pipeline_versions_store.json"
            exit 1
          fi

      - name: Preserve updated metadata from merge snapshot
        run: |
          mkdir -p /tmp/metadata
          cp -r airflow/web_app_data/metadata /tmp/metadata/

      - name: Checkout main to publish metadata
        run: |
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p airflow/web_app_data
          rm -rf airflow/web_app_data/metadata
          cp -r /tmp/metadata/metadata airflow/web_app_data/metadata
          python scripts/metadata/validate_metadata.py --root .

      - name: Commit and push metadata
        run: |
          git config user.email "airflow-bot@example.com"
          git config user.name "Airflow Bot"
          if git diff --quiet -- airflow/web_app_data/metadata; then
            echo "No metadata changes to commit"
          else
            git add airflow/web_app_data/metadata
            git commit -m "Sync merged PR #${{ github.event.pull_request.number }} metadata"
            git push origin main
          fi
